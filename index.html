<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bahiana Tattoo</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0d0d0d;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .container {
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.6s ease forwards;
      animation-delay: 0.3s;
    }

    h1 {
      font-size: clamp(3.5rem, 12vw, 9rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    p {
      margin-top: 1.5rem;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      letter-spacing: 0.3em;
      color: #b3b3b3;
      font-style: italic;
    }

    .btn {
      margin-top: 2.5rem;
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #f5f5f5;
      text-decoration: none;
      color: #f5f5f5;
      letter-spacing: 0.2em;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #f5f5f5;
      color: #0d0d0d;
    }

    .gallery {
      margin-top: 3rem;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .gallery img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      filter: grayscale(100%);
      transition: 0.3s;
    }

    .gallery img:hover {
      filter: grayscale(0%);
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Bahiana</h1>
    <p>tattoo studio</p>

    <!-- BOTÓN -->
    <a class="btn" href="https://wa.me/549XXXXXXXXXX" target="_blank">
      reservar turno
    </a>

    <!-- GALERÍA -->
    <div class="gallery">
      <img src="tattoo1.jpg">
      <img src="tattoo2.jpg">
      <img src="tattoo3.jpg">
    </div>
  </div>
</body>
</html>
